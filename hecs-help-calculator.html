<script>function fmt(n){return n.toFixed(0).replace(/B(?=(d{3})+(?!d))/g,',')}
  function calcHECS(){
    var debt=parseFloat(document.getElementById('hecsDebt').value)||0;
    var inc=parseFloat(document.getElementById('hecsInc').value)||0;
    var rate=0;
    if(inc>=149000)rate=0.10;else if(inc>=132000)rate=0.095;else if(inc>=117000)rate=0.09;
    else if(inc>=103000)rate=0.085;else if(inc>=92000)rate=0.08;else if(inc>=81000)rate=0.075;
    else if(inc>=72000)rate=0.065;else if(inc>=67000)rate=0.055;else if(inc>=62000)rate=0.045;
    else if(inc>=57000)rate=0.03;else if(inc>=51550)rate=0.01;
    var annual=inc*rate;
    var years=annual>0?Math.ceil(debt/annual):0;
    document.getElementById('hecsR').className='result-box finance visible';
    document.getElementById('hecsRVal').textContent='$'+fmt(annual);
    document.getElementById('hecsRLbl').textContent='annual HECS repayment';
    document.getElementById('hecsRGrid').innerHTML=
      '<div class="result-item"><div class="result-item-label">Repayment Rate</div><div class="result-item-value">'+(rate*100).toFixed(1)+'%</div></div>'+
      '<div class="result-item"><div class="result-item-label">Annual Amount</div><div class="result-item-value">$'+fmt(annual)+'</div></div>'+
      '<div class="result-item"><div class="result-item-label">Weekly Deduction</div><div class="result-item-value">$'+fmt(annual/52)+'</div></div>'+
      '<div class="result-item"><div class="result-item-label">Years to Repay</div><div class="result-item-value">'+(years>0?years+' yrs':'Below threshold')+'</div></div>';
  }</script>
