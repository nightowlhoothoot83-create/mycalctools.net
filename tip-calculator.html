<div class="tool-header">
  <div class="tool-header-icon" style="background:rgba(244,114,182,0.12);border:1px solid rgba(244,114,182,0.3)">🧾</div>
  <h1>Tip Calculator</h1>
  <p>Calculate tip and split the bill between any group size with custom tip percentage.</p>
  <div style="margin-top:10px"><span class="tag lifestyle">Bill Split</span><span class="tag lifestyle">Custom Tip %</span></div>
</div>
<div class="tool-layout">
<div class="calc-card">
<div class="field"><label>Bill Amount ($)</label><input type="number" id="tipBill" placeholder="85.50" step="0.01"></div>
  <div class="field"><label>Tip Percentage (%)</label><input type="number" id="tipPct" placeholder="15" min="0" max="100"></div>
  <div class="field"><label>Number of People</label><input type="number" id="tipPpl" value="2" min="1" max="100"></div>
  <div class="toggle-row">
    <button class="toggle-btn" onclick="document.getElementById('tipPct').value=10">10%</button>
    <button class="toggle-btn active" onclick="document.getElementById('tipPct').value=15">15%</button>
    <button class="toggle-btn" onclick="document.getElementById('tipPct').value=18">18%</button>
    <button class="toggle-btn" onclick="document.getElementById('tipPct').value=20">20%</button>
  </div>
  <button class="btn-calc" onclick="calcTip()">Calculate</button>
<div class="result-box lifestyle" id="tipR">
    <div class="result-value lifestyle" id="tipRVal"></div>
    <div class="result-label" id="tipRLbl"></div>
    <div class="result-grid" id="tipRGrid"></div>
  </div>

<script>function calcTip(){
    var bill=parseFloat(document.getElementById('tipBill').value)||0;
    var pct=parseFloat(document.getElementById('tipPct').value)||0;
    var ppl=parseInt(document.getElementById('tipPpl').value)||1;
    var tip=bill*pct/100;var total=bill+tip;var per=total/ppl;
    document.getElementById('tipR').className='result-box lifestyle visible';
    document.getElementById('tipRVal').textContent='$'+per.toFixed(2);
    document.getElementById('tipRLbl').textContent='per person';
    document.getElementById('tipRGrid').innerHTML=
      '<div class="result-item"><div class="result-item-label">Tip Amount</div><div class="result-item-value">$'+tip.toFixed(2)+'</div></div>'+
      '<div class="result-item"><div class="result-item-label">Total Bill</div><div class="result-item-value">$'+total.toFixed(2)+'</div></div>'+
      '<div class="result-item"><div class="result-item-label">Per Person</div><div class="result-item-value">$'+per.toFixed(2)+'</div></div>'+
      '<div class="result-item"><div class="result-item-label">Bill Only/Person</div><div class="result-item-value">$'+(bill/ppl).toFixed(2)+'</div></div>';
  }</script>
