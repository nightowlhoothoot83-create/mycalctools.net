<script>document.addEventListener('DOMContentLoaded',function(){var d=new Date();d.setDate(d.getDate()-14);document.getElementById('perDate').value=d.toISOString().split('T')[0];});
  function calcPer(){
    var last=new Date(document.getElementById('perDate').value);
    var cycle=parseFloat(document.getElementById('perCycle').value)||28;
    var dur=parseFloat(document.getElementById('perDur').value)||5;
    var rows='';var o={day:'numeric',month:'short'};
    for(var i=1;i<=3;i++){
      var s=new Date(last);s.setDate(last.getDate()+cycle*i);
      var e=new Date(s);e.setDate(s.getDate()+dur-1);
      var ov=new Date(s);ov.setDate(s.getDate()-14);
      rows+='<div class="result-item"><div class="result-item-label">Period '+i+'</div><div class="result-item-value">'+s.toLocaleDateString('en-AU',o)+' – '+e.toLocaleDateString('en-AU',o)+'</div></div>';
      rows+='<div class="result-item"><div class="result-item-label">Ovulation ~</div><div class="result-item-value">'+ov.toLocaleDateString('en-AU',o)+'</div></div>';
    }
    document.getElementById('perR').className='result-box health visible';
    document.getElementById('perRVal').textContent='3 periods';
    document.getElementById('perRLbl').textContent='predicted ahead';
    document.getElementById('perRGrid').innerHTML=rows;
  }</script>
