<script>function fmt(n){return n.toFixed(0).replace(/B(?=(d{3})+(?!d))/g,',')}
  function calcTax(){
    var inc=parseFloat(document.getElementById('txInc').value)||0;
    var c=document.getElementById('txCountry').value;
    var tax=0,note='';
    if(c==='au'){
      if(inc>180000)tax=51667+(inc-180000)*0.45;
      else if(inc>120000)tax=29467+(inc-120000)*0.37;
      else if(inc>45000)tax=5092+(inc-45000)*0.325;
      else if(inc>18200)tax=(inc-18200)*0.19;
      var lito=inc<=37500?700:inc<=45000?700-(inc-37500)*0.05:inc<=66667?325-(inc-45000)*0.015:0;
      tax=Math.max(0,tax-lito)+(inc<26000?0:inc*0.02);
      note='Includes Medicare 2%';
    } else if(c==='uk'){
      if(inc>150000)tax=52460+(inc-150000)*0.45;
      else if(inc>50270)tax=8236+(inc-50270)*0.4;
      else if(inc>12570)tax=(inc-12570)*0.2;
      note='UK Tax 2024-25';
    } else {
      if(inc>578125)tax=174238+(inc-578125)*0.37;
      else if(inc>231250)tax=47105+(inc-231250)*0.35;
      else if(inc>89075)tax=10294+(inc-89075)*0.22;
      else if(inc>41775)tax=4807+(inc-41775)*0.22;
      else if(inc>10275)tax=(inc-10275)*0.12;
      note='US Federal only';
    }
    var th=inc-tax;
    document.getElementById('txR').className='result-box finance visible';
    document.getElementById('txRVal').textContent='$'+fmt(th);
    document.getElementById('txRLbl').textContent='take-home ('+note+')';
    document.getElementById('txRGrid').innerHTML=
      '<div class="result-item"><div class="result-item-label">Gross Income</div><div class="result-item-value">$'+fmt(inc)+'</div></div>'+
      '<div class="result-item"><div class="result-item-label">Tax Payable</div><div class="result-item-value">$'+fmt(tax)+'</div></div>'+
      '<div class="result-item"><div class="result-item-label">Take-Home</div><div class="result-item-value">$'+fmt(th)+'</div></div>'+
      '<div class="result-item"><div class="result-item-label">Effective Rate</div><div class="result-item-value">'+(tax/inc*100).toFixed(1)+'%</div></div>';
  }</script>
